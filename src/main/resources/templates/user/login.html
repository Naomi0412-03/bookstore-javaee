<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>用户登录</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: 'Arial',sans-serif;
            background: linear-gradient(135deg,#f093fd 0%,#f5576c 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            width: 100%;
            max-width: 400px;
            padding: 20px;

        }
        .login-card{
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 40px;
        }
        .logo{
            text-align: center;
            margin-bottom:30px;
        }
        .logo h1{
            color: #333;
            font-size: 28px;
        }
        .logo span{
            color: #f5576c;
        }
        .form-group{
            margin-bottom: 20px;
        }
        .form-group label{
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .form-group input{
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus{
            outline: none;
            border-color: #f5576c;
            box-shadow: 0 0 0 3px rgba(245,87,108,0.1);
        }
        .btn{
            width: 100%;
            padding: 12px;
            background: #f5576c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover{
            background: #f5576c;
        }
        .register-link{
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .register-link a{
            color: #f5576c;
            text-decoration: none;
        }
        .register-link a:hover{
            text-decoration: underline;
        }
        .error-message{
            background: #fed7d7;
            color: #c53030;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .error-message.show{
            display: block;
        }
        .remember{
            display: flex;
            align-items: center;
        }
        .remember input{
            margin-right: 5px;
        }
        .forgot-password a{
            color: #f5576c;
            text-decoration: none;
            font-size: 14px;
        }
        .forgot-password a:hover{
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <h1>线上书店</h1>
                <p>欢迎回来</p>
            </div>
        <div class="error-message" th:classappend="${error!=null}?'show':''" th:if="${error!=null}" th:text="${error}"></div>
        <form th:action="@{/user/login}" method="post">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username"
                th:value="${username!=null}?${username}:''" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <div class="remember-forgot">
                <div class="remember">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">记住我</label>
                </div>
                <div class="forgot-password">
                    <a href="#">忘记密码？</a>
                </div>
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
    <div class="register-link">
        还没有账户？<a href="@{/user/register}">立即注册</a>
    </div>
    <div class="register-link" style="margin-top: 10px">
        <a th:href="@{/}">返回首页</a>
    </div>
    </div>
    </div>
</body>
</html>
