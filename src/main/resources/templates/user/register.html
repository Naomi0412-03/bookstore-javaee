<!-- src/main/resources/templates/user/register.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户注册 - 线上书店</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .register-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .form-title {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        .btn-register {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            border: none;
            padding: 12px;
            font-size: 18px;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        .form-control:focus {
            border-color: #6a11cb;
            box-shadow: 0 0 0 0.2rem rgba(106, 17, 203, 0.25);
        }
    </style>
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="/">
            <span style="color: #6a11cb; font-weight: bold;">📚</span>
            <span style="color: #2575fc; font-weight: bold;">线上书店</span>
        </a>
        <a href="/" class="btn btn-outline-secondary">返回首页</a>
    </div>
</nav>

<!-- 注册表单 -->
<div class="register-container">
    <h2 class="form-title">用户注册</h2>

    <form id="registerForm">
        <div class="mb-3">
            <label for="username" class="form-label">用户名 *</label>
            <input type="text" class="form-control" id="username"
                   required placeholder="请输入用户名（4-20位字母数字）">
            <div class="form-text" id="usernameFeedback"></div>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">密码 *</label>
            <input type="password" class="form-control" id="password"
                   required placeholder="请输入密码（6位以上）">
        </div>

        <div class="mb-3">
            <label for="confirmPassword" class="form-label">确认密码 *</label>
            <input type="password" class="form-control" id="confirmPassword"
                   required placeholder="请再次输入密码">
            <div class="form-text" id="passwordMatchFeedback"></div>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">邮箱</label>
            <input type="email" class="form-control" id="email"
                   placeholder="请输入邮箱（可选）">
        </div>

        <div class="mb-3">
            <label for="phone" class="form-label">手机号</label>
            <input type="tel" class="form-control" id="phone"
                   placeholder="请输入手机号（可选）">
        </div>

        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-register">注册账号</button>
        </div>
    </form>

    <div class="login-link">
        <p>已经有账号？ <a href="/user/login">立即登录</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const registerForm = document.getElementById('registerForm');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordMatchFeedback = document.getElementById('passwordMatchFeedback');
        const usernameInput = document.getElementById('username');
        const usernameFeedback = document.getElementById('usernameFeedback');

        // 实时检查密码匹配
        confirmPasswordInput.addEventListener('input', function() {
            if (passwordInput.value !== confirmPasswordInput.value) {
                passwordMatchFeedback.textContent = '两次输入的密码不一致';
                passwordMatchFeedback.style.color = 'red';
            } else {
                passwordMatchFeedback.textContent = '密码匹配';
                passwordMatchFeedback.style.color = 'green';
            }
        });

        // 实时检查用户名是否可用
        usernameInput.addEventListener('blur', function() {
            const username = usernameInput.value.trim();
            if (username.length < 4) {
                usernameFeedback.textContent = '用户名至少4位';
                usernameFeedback.style.color = 'red';
                return;
            }

            if (username.length > 20) {
                usernameFeedback.textContent = '用户名最多20位';
                usernameFeedback.style.color = 'red';
                return;
            }

            // 检查用户名是否已存在
            fetch(`/api/user/check-username?username=${encodeURIComponent(username)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const isAvailable = Boolean(data.available);
                        console.log('isAvailable (布尔转换):', isAvailable);
                        if (isAvailable) {
                            usernameFeedback.textContent = '用户名可用';
                            usernameFeedback.style.color = 'green';
                        } else {
                            usernameFeedback.textContent = '用户名已存在';
                            usernameFeedback.style.color = 'red';
                        }
                    }
                })
                .catch(error => {
                    console.error('检查用户名失败:', error);
                });
        });

        // 表单提交
        registerForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // 验证密码匹配
            if (passwordInput.value !== confirmPasswordInput.value) {
                alert('两次输入的密码不一致');
                return;
            }

            // 验证用户名长度
            if (usernameInput.value.length < 4 || usernameInput.value.length > 20) {
                alert('用户名长度应在4-20位之间');
                return;
            }

            // 验证密码长度
            if (passwordInput.value.length < 6) {
                alert('密码长度至少6位');
                return;
            }

            // 收集表单数据
            const userData = {
                username: usernameInput.value,
                password: passwordInput.value,
                email: document.getElementById('email').value || null,
                phone: document.getElementById('phone').value || null
            };

            try {
                const response = await fetch('/api/user/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();

                if (result.success) {
                    alert('注册成功！');
                    window.location.href = '/user/login';
                } else {
                    alert('注册失败：' + result.message);
                }
            } catch (error) {
                alert('网络错误：' + error.message);
            }
        });
    });
</script>
</body>
</html>
